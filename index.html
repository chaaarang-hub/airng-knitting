<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아링이의 뜨개 도안 만들기</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="sparkleLayer" class="sparkle-layer" aria-hidden="true"></div>
    <main class="landing-shell">
      <div class="landing-content">
        <section class="landing-card">
          <a
            class="landing-link"
            href="https://www.youtube.com/@aring.2"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img class="landing-image" src="./Frame 7787.png" alt="아링 유튜브로 이동" />
          </a>

          <div class="landing-actions">
            <a class="button landing-button landing-button-light" href="./pattern.html">도안 만들기</a>
            <a class="button landing-button landing-button-light" href="./counter.html">단수세기</a>
            <a class="button landing-button landing-button-light" href="./gallery.html">뜨개 도안 모음</a>
          </div>
        </section>
      </div>

      <div class="landing-footer">
        <p>유튜브 : 아링 aring</p>
        <p>인스타그램 : @byongaring</p>
      </div>
    </main>

    <script>
      const sparkleLayer = document.querySelector("#sparkleLayer");
      let lastSparkleAt = 0;

      document.addEventListener("mousemove", handleSparkleTrail);

      function handleSparkleTrail(event) {
        if (!sparkleLayer) {
          return;
        }

        if (window.matchMedia("(pointer: coarse)").matches) {
          return;
        }

        const now = performance.now();
        if (now - lastSparkleAt < 40) {
          return;
        }

        if (Math.random() > 0.3) {
          return;
        }

        lastSparkleAt = now;
        createSparkle(event.clientX, event.clientY);
      }

      function createSparkle(x, y) {
        const sparkle = document.createElement("div");
        const size = 4 + Math.random() * 6;
        const offsetX = (Math.random() - 0.5) * 14;
        const offsetY = (Math.random() - 0.5) * 14;

        sparkle.className = "sparkle";
        sparkle.style.width = `${size}px`;
        sparkle.style.height = `${size}px`;
        sparkle.style.left = `${x + offsetX}px`;
        sparkle.style.top = `${y + offsetY}px`;
        sparkle.style.animationDuration = `${650 + Math.random() * 250}ms`;

        sparkleLayer.appendChild(sparkle);
        sparkle.addEventListener("animationend", () => sparkle.remove(), { once: true });
      }
    </script>
  </body>
</html>
